name: Build & Deploy to EC2

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/stationery-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/stationery-frontend

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build both Docker images and push to Docker Hub
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_BASE_URL=http://${{ secrets.EC2_HOST }}:8000/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — SSH into EC2, write compose + .env, pull images, restart stack
  # No file copy needed — everything is written directly on the EC2 instance.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            mkdir -p ~/stationery-store
            cd ~/stationery-store

            # ── Write docker-compose.yml ─────────────────────────────────────
            # Uses pre-built images from Docker Hub — no build step on EC2.
            cat > docker-compose.yml << 'COMPOSE_EOF'
            services:
              backend:
                image: BACKEND_IMAGE_PLACEHOLDER
                restart: always
                ports:
                  - "8000:8000"
                env_file:
                  - .env
                volumes:
                  - uploads_data:/app/uploads
                networks:
                  - stationery_net
              frontend:
                image: FRONTEND_IMAGE_PLACEHOLDER
                restart: always
                ports:
                  - "5173:80"
                depends_on:
                  - backend
                networks:
                  - stationery_net
            volumes:
              uploads_data:
            networks:
              stationery_net:
                driver: bridge
            COMPOSE_EOF

            # Replace image placeholders with the actual tagged images
            sed -i "s|BACKEND_IMAGE_PLACEHOLDER|${{ secrets.DOCKERHUB_USERNAME }}/stationery-backend:${{ github.sha }}|g" docker-compose.yml
            sed -i "s|FRONTEND_IMAGE_PLACEHOLDER|${{ secrets.DOCKERHUB_USERNAME }}/stationery-frontend:${{ github.sha }}|g" docker-compose.yml

            # ── Write .env from GitHub Secrets ───────────────────────────────
            cat > .env << 'ENV_EOF'
            DATABASE_URL=DB_URL_PLACEHOLDER
            APP_ENV=production
            SECRET_KEY=SECRET_KEY_PLACEHOLDER
            ALGORITHM=HS256
            GEMINI_API_KEY=GEMINI_PLACEHOLDER
            SHOP_OWNER_EMAIL=OWNER_EMAIL_PLACEHOLDER
            SHOP_OWNER_NAME=OWNER_NAME_PLACEHOLDER
            SHOP_OWNER_PASSWORD=OWNER_PASSWORD_PLACEHOLDER
            ENV_EOF

            sed -i "s|DB_URL_PLACEHOLDER|${{ secrets.DATABASE_URL }}|g" .env
            sed -i "s|SECRET_KEY_PLACEHOLDER|${{ secrets.SECRET_KEY }}|g" .env
            sed -i "s|GEMINI_PLACEHOLDER|${{ secrets.GEMINI_API_KEY }}|g" .env
            sed -i "s|OWNER_EMAIL_PLACEHOLDER|${{ secrets.SHOP_OWNER_EMAIL }}|g" .env
            sed -i "s|OWNER_NAME_PLACEHOLDER|${{ secrets.SHOP_OWNER_NAME }}|g" .env
            sed -i "s|OWNER_PASSWORD_PLACEHOLDER|${{ secrets.SHOP_OWNER_PASSWORD }}|g" .env

            # ── Pull fresh images ─────────────────────────────────────────────
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stationery-backend:${{ github.sha }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stationery-frontend:${{ github.sha }}

            # ── Start the stack ───────────────────────────────────────────────
            docker compose up -d --remove-orphans

            # ── Clean up old images ───────────────────────────────────────────
            docker image prune -f
