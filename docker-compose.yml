services:

  # ── FastAPI backend ────────────────────────────────────────────────────────
  # No local db service — database is Render external PostgreSQL.
  # All values come from backend/.env (never committed to git).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - stationery_net

  # ── React / Vite frontend (served by Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - stationery_net

volumes:
  uploads_data:

networks:
  stationery_net:
    driver: bridge
